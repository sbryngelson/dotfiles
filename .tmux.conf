

##### Prefix #####

set -g prefix C-a
bind C-a send-prefix
unbind C-b

set -g mouse on

##### Responsiveness / repetition #####

# Faster ESC for vim/etc
set -sg escape-time 0

# Make repeatable bindings (-r) feel nicer (ms)
set -g repeat-time 700


##### Indexing #####

# Start window numbers at 1
set -g base-index 1


##### Convenience #####

# Move the current window to position 1
bind T move-window -t 1

# Reload config and rename
unbind r
bind r command-prompt -I "#W" "rename-window '%%'"

bind R source-file ~/.tmux.conf \; display-message "Configuration Reloaded!"


##### Modes #####

# Enable vi keys in copy mode, etc.
setw -g mode-keys vi


##### Window (tab) switching — vim style #####

# (These unbinds are harmless; keeps your config clean if defaults/custom binds existed)
unbind h
unbind l

# Repeatable: hold h/l to keep cycling windows
bind -r h previous-window
bind -r l next-window


##### Status line: readable + obvious active tab #####

set -g status on
set -g status-interval 1

# Bar base
set -g status-style "bg=colour235,fg=colour250"

# Left: session name
set -g status-left-length 40
set -g status-left "#[fg=colour30,bg=colour235,bold] #S #[default]"

# Right: time + host
set -g status-right-length 40
set -g status-right "#[fg=colour244,bg=colour235]#H "

# Inactive windows: muted
set -g window-status-style "fg=colour244,bg=colour235"
set -g window-status-format " #[fg=colour244]#I:#W#[default] "

# Active window: sea-green highlight (very noticeable + readable)
# SeaGreen-ish: colour29/30 range; using 29 for a strong green-cyan background.
set -g window-status-current-style "fg=colour231,bg=colour29,bold"
set -g window-status-current-format " #[fg=colour231,bg=colour29,bold]⟦#I:#W⟧#[default] "

# Activity/bell highlighting + enable monitoring
set -g monitor-activity on
set -g visual-activity off
set -g window-status-activity-style "fg=colour231,bg=colour29,bold"
set -g window-status-bell-style "fg=colour231,bg=colour29,bold"

# Separator
set -g window-status-separator " "

# Style for messages and the ":" command prompt
set -g message-style "bg=colour235,fg=colour250"
set -g message-command-style "bg=colour235,fg=colour250"
